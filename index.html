<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy - AI Tutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <span class="status-dot"></span>
                    </div>
                    <span class="logo-text">Study Buddy</span>
                </div>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>

            <div class="chat-history" id="chatHistory">
                <div class="history-placeholder">
                    <p>Your conversations will appear here</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-container">
                <div class="messages-container" id="messagesContainer">
                    <div class="welcome-message" id="welcomeMessage">
                        <div class="welcome-avatar">
                            <div class="avatar-gradient"></div>
                        </div>
                        <h2>Welcome to Study Buddy</h2>
                        <p>Hey there, student! 👋 I'm your AI study companion. I can help you with math, science, history, coding, and more. What would you like to learn today?</p>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <div class="input-border"></div>
                        <textarea
                            id="userInput"
                            placeholder="Message Study Buddy..."
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <span class="char-counter" id="charCounter">0</span>
                            <button class="send-btn" id="sendBtn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p class="input-hint">Press Enter to send • Shift+Enter for new line</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script src="script.js"></script>
</body>
</html>
